kind = "web"
previewPath = "/"
title = "CragMate"
version = "1.0.0"
id = "artifacts/cragmate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20058
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cragmate run dev"

[services.env]
PORT = "20058"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cragmate", "run", "build"]
publicDir = "artifacts/cragmate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
